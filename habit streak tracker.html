<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Streak Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    width:900px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-section{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 20px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.habit-card{
    border:1px solid #ddd;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.habit-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.streak{
    color:green;
    font-weight:bold;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
    border-radius:6px;
}

.day label{
    display:block;
    margin-top:5px;
}

.checked{
    background:#d4edda;
}

.today{
    border:2px solid #007bff;
}
</style>
</head>
<body>

<div class="container">

    <h1>Habit Streak Tracker</h1>

    <div class="input-section">
        <input type="text" id="habitInput" placeholder="Enter habit">
        <button onclick="addHabit()">Add Habit</button>
    </div>

    <div id="habitList"></div>

</div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];

function saveHabits(){
    localStorage.setItem("habits", JSON.stringify(habits));
}

function getDateString(date){
    return date.toISOString().split("T")[0];
}

function calculateStreak(checkins){

    let streak = 0;
    let today = new Date();

    for(let i=0;i<365;i++){

        let date = new Date();
        date.setDate(today.getDate()-i);

        let key = getDateString(date);

        if(checkins[key]){
            streak++;
        }else{
            break;
        }
    }

    return streak;
}

function toggleCheck(habitId,date){

    let habit = habits.find(h=>h.id===habitId);

    if(habit.checkins[date]){
        delete habit.checkins[date];
    }else{
        habit.checkins[date]=true;
    }

    saveHabits();
    renderHabits();
}

function addHabit(){

    let input=document.getElementById("habitInput");

    let name=input.value.trim();

    if(!name) return;

    habits.push({
        id:Date.now(),
        name:name,
        checkins:{}
    });

    input.value="";

    saveHabits();
    renderHabits();
}

function deleteHabit(id){

    habits=habits.filter(h=>h.id!==id);

    saveHabits();
    renderHabits();
}

function renderHabits(){

    let container=document.getElementById("habitList");

    container.innerHTML="";

    habits.forEach(habit=>{

        let streak=calculateStreak(habit.checkins);

        let card=document.createElement("div");
        card.className="habit-card";

        let html=`
            <div class="habit-header">
                <h3>${habit.name}</h3>
                <div>
                    <span class="streak">🔥 ${streak} Day Streak</span>
                    <button onclick="deleteHabit(${habit.id})">
                        Delete
                    </button>
                </div>
            </div>

            <div class="calendar">
        `;

        for(let i=29;i>=0;i--){

            let date=new Date();
            date.setDate(date.getDate()-i);

            let dateKey=getDateString(date);

            let checked=habit.checkins[dateKey];

            let todayClass =
                dateKey===getDateString(new Date())
                ? "today"
                : "";

            html+=`
                <div class="day ${checked ? "checked" : ""} ${todayClass}">
                    ${date.getDate()}/${date.getMonth()+1}
                    <label>
                        <input
                            type="checkbox"
                            ${checked ? "checked" : ""}
                            onchange="toggleCheck(${habit.id}, '${dateKey}')"
                        >
                    </label>
                </div>
            `;
        }

        html+=`</div>`;

        card.innerHTML=html;

        container.appendChild(card);
    });
}

renderHabits();
</script>

</body>
</html>
